services:
  app:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: magisterka-app
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ../benchmark:/app/benchmark
      - ../testResult:/app/testResult
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: magisterka-redis
    ports:
      - "6379:6379"
    environment:
      REDIS_ARGS: "--appendonly yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped