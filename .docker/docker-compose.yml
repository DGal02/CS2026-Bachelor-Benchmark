networks:
  benchmark-net:
    driver: bridge

services:
  app:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: python-app
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEMCACHED_HOST: memcached
      MEMCACHED_PORT: 11211
    volumes:
      - ../benchmark:/app/benchmark
      - ../testResult:/app/testResult
    networks:
      - benchmark-net
    restart: unless-stopped

  memcached:
    image: memcached:alpine
    container_name: system-memcached
    ports:
      - "11211:11211"
    networks:
      - benchmark-net
    deploy:
      resources:
        limits:
          cpus: "${MAX_CPUS}"
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: system-redis
    ports:
      - "6379:6379"
    environment:
      REDIS_ARGS: "--appendonly yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - benchmark-net
    deploy:
      resources:
        limits:
          cpus: "${MAX_CPUS}"
    restart: unless-stopped