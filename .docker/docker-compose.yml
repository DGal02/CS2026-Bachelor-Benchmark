networks:
  benchmark-net:
    driver: bridge

services:
  app:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: python-app
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEMCACHED_HOST: memcached
      MEMCACHED_PORT: 11211
      LEVELDB_PATH: /data/leveldb
      ROCKSDB_PATH: /data/rocksdb
      BERKELEYDB_PATH: /data/berkeleydb
      FDB_CLUSTER_FILE: /etc/foundationdb/fdb.cluster
      TARANTOOL_HOST: tarantool
      TARANTOOL_PORT: 3301
    volumes:
      - ../benchmark:/app/benchmark
      - ../testResult:/app/testResult
    networks:
      - benchmark-net
#    deploy:
#      resources:
#        limits:
#          cpus: "${APP_CPUS}"
    restart: unless-stopped

  memcached:
    image: memcached:alpine
    container_name: system-memcached
#    command: memcached -I 2m
    command: memcached -I 2m -m 4096
    networks:
      - benchmark-net
    deploy:
      resources:
        limits:
          cpus: "${MAX_CPUS}"
    restart: unless-stopped

  foundationdb:
    image: foundationdb/foundationdb:7.4.6
    container_name: system-foundationdb
    environment:
      FDB_NETWORKING_MODE: container
    networks:
      - benchmark-net
    deploy:
      resources:
        limits:
          cpus: "${MAX_CPUS}"
    restart: unless-stopped

  tarantool:
    image: tarantool/tarantool:3.7.0
    container_name: system-tarantool
    command: tarantool /opt/tarantool/init.lua
    volumes:
      - ./tarantool/init.lua:/opt/tarantool/init.lua:ro
    networks:
      - benchmark-net
    deploy:
      resources:
        limits:
          cpus: "${MAX_CPUS}"
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: system-redis
    environment:
      REDIS_ARGS: "--appendonly yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - benchmark-net
    deploy:
      resources:
        limits:
          cpus: "${MAX_CPUS}"
    restart: unless-stopped